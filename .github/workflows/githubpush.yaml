name: SentinelRAG Eval Gate

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: true
      NVIDIA_QWEN_API_KEY: ${{ secrets.NVIDIA_QWEN_API_KEY }}
      NVIDIA_LLAMA_API_KEY: ${{ secrets.NVIDIA_LLAMA_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if this commit is itself a revert
        id: revert_check
        run: |
          MSG=$(git log -1 --pretty=%B)
          if [[ "$MSG" == Revert\ \"* ]]; then
            echo "is_revert=true" >> "$GITHUB_OUTPUT"
            echo "This commit is a revert. Skipping eval to avoid a revert loop."
          else
            echo "is_revert=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.revert_check.outputs.is_revert == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache HuggingFace models
        if: steps.revert_check.outputs.is_revert == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v1

      - name: Install dependencies
        if: steps.revert_check.outputs.is_revert == 'false'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "WARNING: requirements.txt not found."
          fi

      - name: Pre-download embedding and reranker models
        if: steps.revert_check.outputs.is_revert == 'false'
        run: |
          python - <<'PY'
          from langchain_huggingface import HuggingFaceEmbeddings
          from sentence_transformers import CrossEncoder

          HuggingFaceEmbeddings(
              model_name="BAAI/bge-small-en-v1.5",
              model_kwargs={"device": "cpu"},
              encode_kwargs={"normalize_embeddings": True},
          )
          CrossEncoder("cross-encoder/ms-marco-MiniLM-L-6-v2")
          print("Embedding and reranker models cached.")
          PY

      - name: Run eval
        id: run_eval
        if: steps.revert_check.outputs.is_revert == 'false'
        run: |
          # Only pass --min-pass-rate when the script supports it (avoid CI failures
          # for older commits that don't include the flag).
          EVAL_ARGS="--questions eval_questions.json --pipeline-module src.graph --output eval_results.json"
          if python test.py --help 2>/dev/null | grep -q -- '--ci-subset'; then
            EVAL_ARGS="$EVAL_ARGS --ci-subset"
          elif python test.py --help 2>/dev/null | grep -q -- '--limit'; then
            EVAL_ARGS="$EVAL_ARGS --limit 17"
          fi
          if python test.py --help 2>/dev/null | grep -q -- '--min-pass-rate'; then
            EVAL_ARGS="$EVAL_ARGS --min-pass-rate 0.8"
          fi
          python test.py $EVAL_ARGS
        continue-on-error: true

      - name: Upload eval results artifact
        if: always() && steps.revert_check.outputs.is_revert == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: eval_results.json
          if-no-files-found: ignore

      - name: Revert this commit if eval failed
        if: steps.revert_check.outputs.is_revert == 'false' && steps.run_eval.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Eval pass rate was below 80%. Reverting commit ${{ github.sha }}..."

          if git revert --no-edit "${{ github.sha }}"; then
            git push origin "HEAD:${{ github.ref_name }}"
            echo "Reverted and pushed."
          else
            echo "::error::git revert failed. Manual intervention required."
            git revert --abort || true
            exit 1
          fi

      - name: Fail the job if eval did not pass
        if: steps.revert_check.outputs.is_revert == 'false' && steps.run_eval.outcome == 'failure'
        run: |
          echo "::error::Eval pass rate was below the threshold."
          exit 1
